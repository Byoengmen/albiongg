<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알비온 온라인 — 콘텐츠 가이드</title>
  <meta name="description" content="알비온 온라인 PvE, PvP, 경제 등 모든 콘텐츠를 한국어로 정리한 가이드입니다.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --bg-card:   #111127;
      --bg-input:  #181730;
      --border:    #242240;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.12);
      --gold-glow: rgba(201,168,76,0.30);
      --text:      #e4ddd0;
      --text-sub:  #7d758f;
      --text-muted:#393558;
      --blue:      #60a5fa;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --purple:    #a78bfa;
      --green:     #4ade80;
      --r:         13px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, '맑은 고딕', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,11,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1060px;
      margin: 0 auto;
      padding: 0 16px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-logo {
      font-size: 18px;
      font-weight: 900;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--text); font-weight: 400; }
    .nav-menu {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      text-decoration: none;
      transition: all 0.16s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }
    .wip-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-hamburger span {
      display: block;
      height: 2px;
      border-radius: 2px;
      background: var(--text-sub);
      transition: all 0.22s ease;
      transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 640px) {
      .nav-hamburger { display: flex; }
      .nav-menu {
        display: none;
        position: absolute;
        top: 54px;
        left: 0; right: 0;
        flex-direction: column;
        align-items: stretch;
        background: rgba(13,13,28,0.97);
        border-bottom: 1px solid var(--border);
        padding: 8px 12px 12px;
        gap: 2px;
      }
      .nav-menu.open { display: flex; }
      .nav-link { padding: 10px 14px; font-size: 14px; }
    }

    /* ── HEADER ── */
    .hdr {
      position: relative;
      text-align: center;
      padding: 36px 16px 26px;
      background: linear-gradient(180deg, #0e0c26 0%, var(--bg) 100%);
      overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .hdr::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.45), transparent);
    }
    .hdr-inner { position: relative; z-index: 1; }
    .hdr-eyebrow {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 10px;
    }
    .hdr h1 {
      font-size: clamp(22px, 5.5vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .hdr h1 em { font-style: normal; color: var(--gold); }
    .hdr-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ── TABS ── */
    .tabs-wrap {
      max-width: 1060px;
      margin: 0 auto;
      padding: 24px 14px 0;
    }
    .tabs-bar {
      display: flex;
      gap: 3px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 9px 9px 0 0;
      background: transparent;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.16s;
      position: relative;
      bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab-btn.active {
      color: var(--gold);
      background: var(--bg);
      border-color: var(--border);
      border-bottom-color: var(--bg);
    }
    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 18px;
      border-radius: 9px;
      background: rgba(255,255,255,0.07);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      padding: 0 5px;
    }
    .tab-btn.active .tab-count {
      background: var(--gold-dim);
      color: var(--gold);
    }

    /* ── CARDS ── */
    .cards-section {
      max-width: 1060px;
      margin: 0 auto;
      padding: 22px 14px 64px;
    }
    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      animation: panelIn 0.2s ease;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }
    @media (max-width: 560px) {
      .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
    @media (max-width: 380px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    .guide-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }
    .guide-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
      border-color: rgba(201,168,76,0.22);
    }

    .card-thumb {
      height: 116px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.07) 0%, transparent 65%);
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(0deg, rgba(0,0,0,0.45), transparent);
    }
    .card-thumb .thumb-icon {
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6));
      line-height: 1;
    }

    .card-body {
      padding: 13px 15px 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 11.5px;
      color: var(--text-sub);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 11px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 11px;
    }
    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
    /* 난이도 태그 */
    .d0 { background: rgba(74,222,128,0.10);  color: #4ade80; border: 1px solid rgba(74,222,128,0.20);  }
    .d1 { background: rgba(96,165,250,0.10);  color: #60a5fa; border: 1px solid rgba(96,165,250,0.20);  }
    .d2 { background: rgba(251,146,60,0.10);  color: #fb923c; border: 1px solid rgba(251,146,60,0.20);  }
    .d3 { background: rgba(248,113,113,0.10); color: #f87171; border: 1px solid rgba(248,113,113,0.20); }
    /* 유형 태그 */
    .dt { background: rgba(255,255,255,0.05); color: var(--text-sub); border: 1px solid var(--border); }

    .card-btn {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.16s;
    }
    .card-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .modal-overlay.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      animation: modalIn 0.22s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text-sub);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.16s;
      z-index: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .modal-body {
      display: grid;
      grid-template-columns: 1fr 280px;
    }
    @media (max-width: 680px) {
      .modal-body { grid-template-columns: 1fr; }
    }
    .modal-left {
      padding: 28px 26px 22px;
      border-right: 1px solid var(--border);
    }
    @media (max-width: 680px) {
      .modal-left { border-right: none; border-bottom: 1px solid var(--border); padding: 22px 18px 18px; }
    }
    .modal-hdr {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 14px;
      padding-right: 36px;
    }
    .modal-hdr-icon {
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 21px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
    }
    .modal-intro {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.75;
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-section { margin-bottom: 16px; }
    .modal-section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 9px;
    }
    .zone-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .zone-list li {
      display: flex;
      gap: 10px;
      font-size: 12.5px;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .zone-label {
      font-weight: 700;
      white-space: nowrap;
      min-width: 80px;
      flex-shrink: 0;
    }
    .zone-blue  { color: #60a5fa; }
    .zone-red   { color: #f87171; }
    .zone-black { color: #c084fc; }
    .modal-note {
      margin-top: 10px;
      padding: 8px 11px;
      background: rgba(192,132,252,0.07);
      border-left: 2px solid rgba(192,132,252,0.35);
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--text-sub);
    }
    .modal-note a {
      color: #c084fc;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .modal-note a:hover { text-decoration: underline; }
    .modal-tip {
      font-size: 12.5px;
      color: var(--text-sub);
      line-height: 1.65;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.14);
      border-radius: 8px;
      padding: 10px 13px;
    }
    .modal-right {
      padding: 28px 20px 22px;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 680px) {
      .modal-right { padding: 18px 18px 14px; }
    }
    .img-placeholder {
      flex: 1;
      min-height: 180px;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--bg-input);
    }
    .img-placeholder .ph-icon { font-size: 30px; opacity: 0.35; }
    .img-placeholder p { font-size: 11.5px; color: var(--text-muted); text-align: center; line-height: 1.6; }
    .modal-related {
      padding: 16px 26px 20px;
      border-top: 1px solid var(--border);
    }
    @media (max-width: 680px) {
      .modal-related { padding: 14px 18px 18px; }
    }
    .modal-related-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .related-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .related-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.16s;
      font-family: inherit;
    }
    .related-chip:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .chip-cat {
      font-size: 9.5px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .feature-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .feature-list li {
      display: flex;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .feature-list li::before {
      content: '·';
      color: var(--gold);
      font-weight: 700;
      flex-shrink: 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Albion<span>GG</span></a>
    <button class="nav-hamburger" id="navBurger" onclick="toggleNav()" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html" class="nav-link">홈</a></li>
      <li><a href="index.html" class="nav-link">페임 계산기</a></li>
      <li><a href="#" class="nav-link" onclick="wip(event)">빌드 <span class="wip-badge">준비중</span></a></li>
      <li><a href="guide.html" class="nav-link active">가이드</a></li>
    </ul>
  </div>
</nav>

<header class="hdr">
  <div class="hdr-inner">
    <span class="hdr-eyebrow">Albion Online</span>
    <h1>콘텐츠 <em>가이드</em></h1>
    <p class="hdr-sub">알비온 온라인의 모든 콘텐츠를 카테고리별로 정리했습니다</p>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="pve"  onclick="switchTab('pve')">PvE  <span class="tab-count" id="cnt-pve"></span></button>
    <button class="tab-btn"        data-tab="pvp"  onclick="switchTab('pvp')">PvP  <span class="tab-count" id="cnt-pvp"></span></button>
    <button class="tab-btn"        data-tab="life" onclick="switchTab('life')">생활 <span class="tab-count" id="cnt-life"></span></button>
  </div>
</div>

<section class="cards-section">
  <div class="tab-panel active" id="panel-pve"></div>
  <div class="tab-panel"        id="panel-pvp"></div>
  <div class="tab-panel"        id="panel-life"></div>
</section>

<footer>
  알비온 온라인 한국어 정보 사이트 &nbsp;·&nbsp; 데이터는 게임 내 수치 기준 &nbsp;·&nbsp; Albion Online
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modalInner"></div>
  </div>
</div>

<script>
// 난이도 → CSS 클래스 / 한글 표기
const DIFF = { '입문': 'd0', '초급': 'd1', '중급': 'd2', '고급': 'd3' };

const DATA = {
  pve: [
    { name: '필드사냥',          desc: '오픈 월드에서 몬스터를 사냥해 페임과 실버를 획득',                    diff: '입문', type: '솔로·그룹', color: '#6b2d1c', icon: '⚔️' },
    { name: '오픈 던전',         desc: '누구나 입장 가능한 개방형 던전, 다른 플레이어와 마주칠 수 있음',       diff: '초급', type: '솔로·그룹', color: '#4a2266', icon: '🏛️' },
    { name: '솔로 던전',         desc: '혼자만 입장 가능한 인스턴스 던전',                                   diff: '초급', type: '솔로',      color: '#183352', icon: '🗡️' },

function buildCard(c) {
  return `
    <div class="guide-card">
      <div class="card-thumb" style="background:${c.color}">
        <span class="thumb-icon">${c.icon}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <p class="card-desc">${c.desc}</p>
        <div class="card-tags">
          <span class="tag ${DIFF[c.diff]}">${c.diff}</span>
          <span class="tag dt">${c.type}</span>
        </div>
        <button class="card-btn" onclick="openModal('${c.name}')">자세히 보기</button>
      </div>
    </div>`;
}

function renderAll() {
  Object.entries(DATA).forEach(([key, items]) => {
    document.getElementById('panel-' + key).innerHTML =
      `<div class="cards-grid">${items.map(buildCard).join('')}</div>`;
    document.getElementById('cnt-' + key).textContent = items.length;
  });
}

function switchTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === key));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + key));
}

function toggleNav() {
  document.getElementById('navBurger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}

function wip(e) {
  e.preventDefault();
  e.stopPropagation();
  alert('준비 중인 기능입니다.');
}

function openModal(name) {
  const d = MODAL_DATA[name];
  if (!d) { alert('준비 중인 기능입니다.'); return; }

  let contentSection = '';
  if (d.zones) {
    const zoneItems = d.zones.map(z =>
      `<li><span class="zone-label ${z.cls}">${z.label}</span><span>${z.desc}</span></li>`
    ).join('');
    contentSection = `
      <div class="modal-section">
        <div class="modal-section-title">존별 특징</div>
        <ul class="zone-list">${zoneItems}</ul>
        <p class="modal-note">→ 블랙존에서는 <a onclick="openModal('갱킹')">갱킹</a>을 주의해야 한다</p>
      </div>`;
  } else if (d.features) {
    const featureItems = d.features.map(f => `<li>${f}</li>`).join('');
    contentSection = `
      <div class="modal-section">
        <div class="modal-section-title">특징</div>
        <ul class="feature-list">${featureItems}</ul>
      </div>`;
  }

  const related = d.related.map(r => {
    if (r.type === 'link') {
      return `<a class="related-chip" href="${r.href}"><span class="chip-cat">${r.cat}</span>${r.name}</a>`;
    }
    return `<button class="related-chip" onclick="openModal('${r.name}')"><span class="chip-cat">${r.cat}</span>${r.name}</button>`;
  }).join('');

  document.getElementById('modalInner').innerHTML = `
    <div class="modal-body">
      <div class="modal-left">
        <div class="modal-hdr">
          <div class="modal-hdr-icon" style="background:${d.color}">${d.icon}</div>
          <div class="modal-title">${name}</div>
        </div>
        <p class="modal-intro">${d.intro.replace(/\n/g, '<br>')}</p>
        ${contentSection}
        <div class="modal-section">
          <div class="modal-section-title">추천 진입 시기</div>
          <p class="modal-tip">${d.tip}</p>
        </div>
      </div>
      <div class="modal-right">
        <div class="img-placeholder">
          <span class="ph-icon">📸</span>
          <p>인게임 사진<br>준비 중</p>
        </div>
      </div>
    </div>
    <div class="modal-related">
      <div class="modal-related-title">관련 콘텐츠</div>
      <div class="related-list">${related}</div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('click', function(e) {
  const nav = document.querySelector('.navbar');
  if (nav && !nav.contains(e.target)) {
    document.getElementById('navBurger').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

renderAll();
</script>
