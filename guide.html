<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Assembly — 콘텐츠 가이드</title>
  <meta name="description" content="알비온 온라인 콘텐츠 가이드. PvE·PvP·생활 콘텐츠를 태그별로 찾아보세요.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --bg-card:   #111127;
      --border:    #242240;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.12);
      --text:      #e4ddd0;
      --text-sub:  #7d758f;
      --text-muted:#393558;
      --r:         13px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, '맑은 고딕', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,11,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1060px; margin: 0 auto; padding: 0 16px;
      height: 54px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    .nav-logo {
      font-size: 18px; font-weight: 900; color: var(--gold);
      text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .nav-logo span { color: var(--text); font-weight: 400; }
    .nav-menu { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 600; color: var(--text-sub);
      text-decoration: none; transition: all 0.16s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }
    .wip-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--text-muted); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
    }
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 36px; height: 36px; padding: 6px;
      border: 1px solid var(--border); border-radius: 8px;
      background: transparent; cursor: pointer; flex-shrink: 0;
    }
    .nav-hamburger span {
      display: block; height: 2px; border-radius: 2px;
      background: var(--text-sub); transition: all 0.22s ease; transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 640px) {
      .nav-hamburger { display: flex; }
      .nav-menu {
        display: none; position: absolute; top: 54px; left: 0; right: 0;
        flex-direction: column; align-items: stretch;
        background: rgba(13,13,28,0.97); border-bottom: 1px solid var(--border);
        padding: 8px 12px 12px; gap: 2px;
      }
      .nav-menu.open { display: flex; }
      .nav-link { padding: 10px 14px; font-size: 14px; }
    }

    /* ── HEADER ── */
    .hdr {
      text-align: center; padding: 48px 16px 40px;
      background: linear-gradient(180deg, #0d0b25 0%, var(--bg) 100%);
      position: relative; overflow: hidden;
    }
    .hdr::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.09) 0%, transparent 65%);
      pointer-events: none;
    }
    .hdr::after {
      content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
    }
    .hdr-inner { position: relative; z-index: 1; }
    .hdr-eyebrow {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7; margin-bottom: 12px;
    }
    .hdr h1 {
      font-size: clamp(28px, 6vw, 44px); font-weight: 900;
      letter-spacing: -1.5px; color: var(--text); line-height: 1.1;
    }
    .hdr h1 em { font-style: normal; color: var(--gold); }
    .hdr-sub { margin-top: 8px; font-size: 13px; color: var(--text-sub); }

    /* ── AD ── */
    .ad-wrap {
      padding: 12px 14px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .ad-wrap.ad-bottom { border-top: 1px solid var(--border); border-bottom: none; }
    .ad-box {
      position: relative; width: 728px; height: 90px;
      max-width: 100%; margin: 0 auto;
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.07);
      border-radius: 6px; overflow: hidden;
    }
    .ad-label {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text-muted);
      pointer-events: none; user-select: none;
    }
    @media (max-width: 760px) { .ad-box { width: 100%; height: 50px; } }

    /* ── TAG FILTER ── */
    .filter-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 24px 16px 0;
    }
    .tag-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding-bottom: 20px;
    }
    .tag-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-sub);
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .tag-btn:hover { color: var(--text); border-color: rgba(201,168,76,0.3); }
    .tag-btn.active {
      background: var(--gold-dim); color: var(--gold);
      border-color: rgba(201,168,76,0.4);
    }

    /* ── CARDS ── */
    .cards-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 0 16px 56px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 20px 16px;
      font-size: 11px; color: var(--text-muted);
      border-top: 1px solid var(--border); letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Albion<span>Assembly</span></a>
    <button class="nav-hamburger" id="navBurger" onclick="toggleNav()" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html"      class="nav-link">홈</a></li>
      <li><a href="calculator.html" class="nav-link">페임 계산기</a></li>
      <li><a href="#"               class="nav-link" onclick="wip(event)">빌드 <span class="wip-badge">준비중</span></a></li>
      <li><a href="guide.html"      class="nav-link active">가이드</a></li>
      <li><a href="player.html"     class="nav-link">전적 조회</a></li>
      <li><a href="glossary.html"   class="nav-link">용어 사전</a></li>
    </ul>
  </div>
</nav>

<header class="hdr">
  <div class="hdr-inner">
    <span class="hdr-eyebrow">Albion Online</span>
    <h1>콘텐츠 <em>가이드</em></h1>
    <p class="hdr-sub">알비온 온라인의 모든 콘텐츠를 태그별로 찾아보세요</p>
  </div>
</header>

<!-- 광고 1: 헤더 아래 -->
<div class="ad-wrap">
  <div class="ad-box">
    <span class="ad-label">광고 영역</span>
    <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-Y5aAmnxQ6kXtVtfh" data-ad-width="728" data-ad-height="90"></ins>
    <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
  </div>
</div>

<div class="filter-wrap">
  <div class="tag-bar">
    <button class="tag-btn active" onclick="setTag(this)">전체</button>
    <button class="tag-btn"        onclick="setTag(this)">PvE</button>
    <button class="tag-btn"        onclick="setTag(this)">PvP</button>
    <button class="tag-btn"        onclick="setTag(this)">생활</button>
    <button class="tag-btn"        onclick="setTag(this)">솔로</button>
    <button class="tag-btn"        onclick="setTag(this)">그룹</button>
    <button class="tag-btn"        onclick="setTag(this)">대규모</button>
    <button class="tag-btn"        onclick="setTag(this)">초보추천</button>
  </div>
</div>

<div class="cards-wrap">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- 광고 2: 하단 -->
<div class="ad-wrap ad-bottom">
  <div class="ad-box">
    <span class="ad-label">광고 영역</span>
    <ins class="kakao_ad_area" style="display:none;" data-ad-unit="DAN-Z1BMLgCyvYaDqzmG" data-ad-width="728" data-ad-height="90"></ins>
  </div>
</div>

<footer>
  알비온 온라인의 모든 정보 &nbsp;·&nbsp; 데이터는 게임 내 수치 기준 &nbsp;·&nbsp; Albion Online
</footer>

<script>
function setTag(btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleNav() {
  document.getElementById('navBurger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}

function wip(e) {
  e.preventDefault();
  e.stopPropagation();
  alert('준비 중인 기능입니다.');
}

document.addEventListener('click', e => {
  const nav = document.querySelector('.navbar');
  if (nav && !nav.contains(e.target)) {
    document.getElementById('navBurger').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  }
});
</script>
</body>
</html>
