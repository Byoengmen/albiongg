<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Assembly — 콘텐츠 가이드</title>
  <meta name="description" content="알비온 온라인 콘텐츠 가이드. PvE·PvP·생활 콘텐츠를 태그별로 찾아보세요.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --bg-card:   #111127;
      --border:    #242240;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.12);
      --text:      #e4ddd0;
      --text-sub:  #7d758f;
      --text-muted:#393558;
      --r:         13px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, '맑은 고딕', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,11,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1060px; margin: 0 auto; padding: 0 16px;
      height: 54px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    .nav-logo {
      font-size: 18px; font-weight: 900; color: var(--gold);
      text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .nav-logo span { color: var(--text); font-weight: 400; }
    .nav-menu { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 600; color: var(--text-sub);
      text-decoration: none; transition: all 0.16s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }
    .wip-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--text-muted); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
    }
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 36px; height: 36px; padding: 6px;
      border: 1px solid var(--border); border-radius: 8px;
      background: transparent; cursor: pointer; flex-shrink: 0;
    }
    .nav-hamburger span {
      display: block; height: 2px; border-radius: 2px;
      background: var(--text-sub); transition: all 0.22s ease; transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 640px) {
      .nav-hamburger { display: flex; }
      .nav-menu {
        display: none; position: absolute; top: 54px; left: 0; right: 0;
        flex-direction: column; align-items: stretch;
        background: rgba(13,13,28,0.97); border-bottom: 1px solid var(--border);
        padding: 8px 12px 12px; gap: 2px;
      }
      .nav-menu.open { display: flex; }
      .nav-link { padding: 10px 14px; font-size: 14px; }
    }

    /* ── HEADER ── */
    .hdr {
      text-align: center; padding: 48px 16px 40px;
      background: linear-gradient(180deg, #0d0b25 0%, var(--bg) 100%);
      position: relative; overflow: hidden;
    }
    .hdr::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.09) 0%, transparent 65%);
      pointer-events: none;
    }
    .hdr::after {
      content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
    }
    .hdr-inner { position: relative; z-index: 1; }
    .hdr-eyebrow {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7; margin-bottom: 12px;
    }
    .hdr h1 {
      font-size: clamp(28px, 6vw, 44px); font-weight: 900;
      letter-spacing: -1.5px; color: var(--text); line-height: 1.1;
    }
    .hdr h1 em { font-style: normal; color: var(--gold); }
    .hdr-sub { margin-top: 8px; font-size: 13px; color: var(--text-sub); }

    /* ── AD ── */
    .ad-wrap {
      padding: 12px 14px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .ad-wrap.ad-bottom { border-top: 1px solid var(--border); border-bottom: none; }
    .ad-box {
      position: relative; width: 728px; height: 90px;
      max-width: 100%; margin: 0 auto;
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.07);
      border-radius: 6px; overflow: hidden;
    }
    .ad-label {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text-muted);
      pointer-events: none; user-select: none;
    }
    @media (max-width: 760px) { .ad-box { width: 100%; height: 50px; } }

    /* ── TAG FILTER ── */
    .filter-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 24px 16px 0;
    }
    .tag-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding-bottom: 20px;
    }
    .tag-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-sub);
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .tag-btn:hover { color: var(--text); border-color: rgba(201,168,76,0.3); }
    .tag-btn.active {
      background: var(--gold-dim); color: var(--gold);
      border-color: rgba(201,168,76,0.4);
    }

    /* ── CARDS ── */
    .cards-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 0 16px 56px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ── CARD COMPONENTS ── */
    .content-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      cursor: pointer;
    }
    .content-card:hover {
      border-color: rgba(201,168,76,0.28);
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
    }
    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #141330 0%, #1a1640 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; user-select: none;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .card-body {
      padding: 14px 14px 12px;
      display: flex; flex-direction: column; gap: 10px; flex: 1;
    }
    .card-name {
      font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -0.3px;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: auto;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .card-tag {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text-muted); background: rgba(255,255,255,0.03);
      white-space: nowrap;
    }
    .card-tag.pve    { color: #6db8ff; border-color: rgba(109,184,255,0.25); background: rgba(109,184,255,0.07); }
    .card-tag.pvp    { color: #ff7b7b; border-color: rgba(255,123,123,0.25); background: rgba(255,123,123,0.07); }
    .card-tag.life   { color: #74d99f; border-color: rgba(116,217,159,0.25); background: rgba(116,217,159,0.07); }
    .card-tag.solo   { color: #c9a84c; border-color: rgba(201,168,76,0.25);  background: rgba(201,168,76,0.07);  }
    .card-tag.group  { color: #b87fff; border-color: rgba(184,127,255,0.25); background: rgba(184,127,255,0.07); }
    .card-tag.large  { color: #ff9d4d; border-color: rgba(255,157,77,0.25);  background: rgba(255,157,77,0.07);  }
    .card-tag.newbie  { color: #4dd9d9; border-color: rgba(77,217,217,0.25);  background: rgba(77,217,217,0.07);  }
    .card-tag.system  { color: #a8a0ff; border-color: rgba(168,160,255,0.25); background: rgba(168,160,255,0.07); }
    .detail-btn {
      padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-size: 11px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .detail-btn:hover {
      color: var(--gold); border-color: rgba(201,168,76,0.4); background: var(--gold-dim);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #13122a; border: 1px solid #2e2c50;
      border-radius: 16px; width: 100%; max-width: 580px;
      max-height: 82vh; overflow-y: auto;
      padding: 28px 28px 24px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 20px;
    }
    .modal-title { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-sub); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.14s; flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .modal-section { margin-bottom: 20px; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-title {
      font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--gold); opacity: 0.8;
      margin-bottom: 8px;
    }
    .modal-section p {
      font-size: 13px; color: var(--text-sub); line-height: 1.85;
    }
    .modal-section ul {
      list-style: none; display: flex; flex-direction: column; gap: 5px;
    }
    .modal-section ul li {
      font-size: 13px; color: var(--text-sub); line-height: 1.7;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-section ul li .li-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      image-rendering: auto;
    }
    .arrow-icon {
      font-size: 13px; font-weight: 900; flex-shrink: 0;
      line-height: 1; display: flex; align-items: center;
    }
    .zone-dot {
      display: inline-block; width: 12px; height: 12px;
      border-radius: 50%; flex-shrink: 0;
    }
    .modal-section ul li.dot-item {
      padding-left: 14px; position: relative;
    }
    .modal-section ul li.dot-item::before {
      content: '·'; position: absolute; left: 0; color: var(--gold); font-weight: 900;
    }
    .modal-related { display: flex; flex-wrap: wrap; gap: 6px; }
    .modal-rel-tag {
      font-size: 12px; font-weight: 700; color: var(--text-sub);
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 7px; padding: 4px 10px; cursor: pointer; transition: all 0.14s;
    }
    .modal-rel-tag:hover { color: var(--gold); border-color: rgba(201,168,76,0.4); background: var(--gold-dim); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 20px 16px;
      font-size: 11px; color: var(--text-muted);
      border-top: 1px solid var(--border); letter-spacing: 0.3px;
    }
  </style>
</head>

<script>
const TAG_CLASS = {
  'PvE': 'pve', 'PvP': 'pvp', '생활': 'life',
  '솔로': 'solo', '그룹': 'group', '대규모': 'large', '초보추천': 'newbie', '시스템': 'system',
};

const CONTENTS = [
  {
    name: '제련·제작', icon: '⚒️', tags: ['생활', '솔로'],
    modal: [
      { title: '소개', text: '채집한 원료를 정제 원료로 변환하고, 이를 장비나 소모품으로 만드는 활동입니다.\n알비온의 모든 장비는 플레이어가 직접 만듭니다.' },
      { title: '제련이란', text: '채집한 원료를 그냥 사용할 수는 없습니다. 제련소에서 정제 원료로 가공해야 제작에 사용할 수 있습니다.\n티어가 높아질수록 필요한 하위 티어 정제 원료와 원자재 양이 늘어납니다.' },
      { title: '집중 포인트', text: '제련 시 집중 포인트를 사용하면 자원을 일부 돌려받을 수 있어 효율이 크게 오릅니다.\n대량 제련 전에는 집중 포인트 보유 여부를 반드시 확인하세요.' },
      { title: '도시별 생산 보너스', list: [
        { icon: 'T4_PLANKS',   text: '판자 → Fort Sterling (제재소)' },
        { icon: 'T4_CLOTH',    text: '직물 → Lymhurst (방직공)' },
        { icon: 'T4_ROCK',     text: '석괴 → Bridgewatch (석공)' },
        { icon: 'T4_LEATHER',  text: '피혁 → Martlock (무두장이)' },
        { icon: 'T4_METALBAR', text: '금속 막대 → Thetford (제련소)' },
      ], note: '같은 자원이라도 해당 도시에서 제련하면 더 많은 정제 원료를 얻을 수 있습니다.' },
      { title: '변형', text: '원료가 부족할 때는 하위 티어 자원을 상위 티어로 변형할 수 있습니다 (최소 T4).\n제작소의 두 번째 탭에서 이용 가능합니다.' },
      { title: '수익화', text: '일부 플레이어는 원료를 시장에서 저렴하게 구매해 제련 후 판매하는 방식으로 수익을 냅니다.\n정제 원료는 장비 제작 수요로 인해 항상 안정적인 시장이 형성되어 있습니다.' },
      { title: '관련 콘텐츠', related: ['채집', '무역·경매장', '요리'] },
    ],
  },
  {
    name: '지역 유형 및 전투 상태', icon: '🗺️', tags: ['시스템', '초보추천'],
    modal: [
      { title: '소개', text: '알비온의 세계는 블루, 옐로우, 레드, 블랙 네 가지 지역으로 구분됩니다.\n지역마다 PvP 규칙이 다르며, 전투 결과도 달라집니다.' },
      { title: '지역별 규칙', list: [
        { color: '#4A90D9',                          text: '블루존: 완전 안전 구역. PvP 불가.' },
        { color: '#F5C518',                          text: '옐로존: PvP 가능하나 사망해도 장비를 잃지 않습니다. 체력이 0이 되면 쓰러지며, 장착 장비 내구도 5%가 감소합니다.' },
        { color: '#E84040',                          text: '레드존: 사망 시 보유한 모든 아이템이 드롭됩니다. 일부는 폐기되고 나머지는 다른 플레이어가 획득할 수 있습니다.' },

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let activeTag = '전체';

function render() {
  const filtered = activeTag === '전체'
    ? CONTENTS
    : CONTENTS.filter(c => c.tags.includes(activeTag));
  document.getElementById('cardsGrid').innerHTML = filtered.map(c => `
    <div class="content-card" onclick="openModal('${esc(c.name)}')">
      <div class="card-thumb">${c.icon}</div>
      <div class="card-body">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-footer">
          <div class="card-tags">${c.tags.map(t => `<span class="card-tag ${TAG_CLASS[t]||''}">${esc(t)}</span>`).join('')}</div>
          <button class="detail-btn" onclick="event.stopPropagation();openModal('${esc(c.name)}')">자세히</button>
        </div>
      </div>
    </div>
  `).join('');
}

function setTag(btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTag = btn.textContent.trim();
  render();
}

function openModal(name) {
  const c = CONTENTS.find(x => x.name === name);
  if (!c) return;
  const sectionsHtml = c.modal.map(s => {
    if (s.related) {
      return `<div class="modal-section">
        <div class="modal-section-title">${esc(s.title)}</div>
        <div class="modal-related">${s.related.map(r => `<span class="modal-rel-tag">${esc(r)}</span>`).join('')}</div>
      </div>`;
    }
    if (s.list) {
      return `<div class="modal-section">
        <div class="modal-section-title">${esc(s.title)}</div>
        <ul>${s.list.map(li =>
          li.icon  ? `<li><img class="li-icon" src="https://render.albiononline.com/v1/item/${li.icon}.png" alt="${esc(li.text)}" width="32" height="32"><span>${esc(li.text)}</span></li>`
          : li.arrow ? `<li><span class="arrow-icon" style="color:${li.arrowColor}">${li.arrow}</span><span>${esc(li.text)}</span></li>`
          : li.color ? `<li><span class="zone-dot" style="background:${li.color};${li.border?'border:'+li.border:''}"></span><span>${esc(li.text)}</span></li>`
          : `<li class="dot-item">${esc(li)}</li>`
        ).join('')}</ul>
        ${s.note ? `<p style="margin-top:8px">${esc(s.note)}</p>` : ''}
      </div>`;
    }
    if (s.html) {
      return `<div class="modal-section">
        <div class="modal-section-title">${esc(s.title)}</div>
        <p>${s.html}</p>
      </div>`;
    }
    return `<div class="modal-section">
      <div class="modal-section-title">${esc(s.title)}</div>
      <p>${esc(s.text).replace(/\n/g,'<br>')}</p>
    </div>`;
  }).join('');
  document.getElementById('modalBox').innerHTML = `
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        ${c.headerIcon ? `<img src="${c.headerIcon}" width="32" height="32" onerror="this.style.display='none'" style="flex-shrink:0">` : ''}
        <span class="modal-title">${esc(c.name)}</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${sectionsHtml}
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();

function toggleNav() {
  document.getElementById('navBurger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}

function wip(e) {
  e.preventDefault();
  e.stopPropagation();
  alert('준비 중인 기능입니다.');
}

document.addEventListener('click', e => {
  const nav = document.querySelector('.navbar');
  if (nav && !nav.contains(e.target)) {
    document.getElementById('navBurger').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  }
});
</script>
