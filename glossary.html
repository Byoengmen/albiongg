<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Assembly — 용어 사전</title>
  <meta name="description" content="알비온 온라인에서 자주 쓰이는 용어 모음. CC·갱킹·ZvZ·페임 등 주요 게임 용어를 한국어로 설명합니다.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --bg-card:   #111127;
      --bg-input:  #181730;
      --border:    #242240;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.12);
      --gold-glow: rgba(201,168,76,0.30);
      --text:      #e4ddd0;
      --text-sub:  #7d758f;
      --text-muted:#393558;
      --r:         13px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, '맑은 고딕', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,11,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1060px; margin: 0 auto; padding: 0 16px;
      height: 54px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    .nav-logo {
      font-size: 18px; font-weight: 900; color: var(--gold);
      text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .nav-logo span { color: var(--text); font-weight: 400; }
    .nav-menu { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 600; color: var(--text-sub);
      text-decoration: none; transition: all 0.16s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--gold); background: var(--gold-dim); }
    .wip-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--text-muted); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px;
    }
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 36px; height: 36px; padding: 6px;
      border: 1px solid var(--border); border-radius: 8px;
      background: transparent; cursor: pointer; flex-shrink: 0;
    }
    .nav-hamburger span {
      display: block; height: 2px; border-radius: 2px;
      background: var(--text-sub); transition: all 0.22s ease; transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 640px) {
      .nav-hamburger { display: flex; }
      .nav-menu {
        display: none; position: absolute; top: 54px; left: 0; right: 0;
        flex-direction: column; align-items: stretch;
        background: rgba(13,13,28,0.97); border-bottom: 1px solid var(--border);
        padding: 8px 12px 12px; gap: 2px;
      }
      .nav-menu.open { display: flex; }
      .nav-link { padding: 10px 14px; font-size: 14px; }
    }

    /* ── HEADER ── */
    .hdr {
      text-align: center; padding: 48px 16px 40px;
      background: linear-gradient(180deg, #0d0b25 0%, var(--bg) 100%);
      position: relative; overflow: hidden;
    }
    .hdr::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.09) 0%, transparent 65%);
      pointer-events: none;
    }
    .hdr::after {
      content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
    }
    .hdr-inner { position: relative; z-index: 1; }
    .hdr-eyebrow {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7; margin-bottom: 12px;
    }
    .hdr h1 {
      font-size: clamp(28px, 6vw, 44px); font-weight: 900;
      letter-spacing: -1.5px; color: var(--text); line-height: 1.1;
    }
    .hdr h1 em { font-style: normal; color: var(--gold); }
    .hdr-sub { margin-top: 8px; font-size: 13px; color: var(--text-sub); }

    /* ── AD ── */
    .ad-wrap {
      padding: 12px 14px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .ad-wrap.ad-bottom { border-top: 1px solid var(--border); border-bottom: none; }
    .ad-box {
      position: relative; width: 728px; height: 90px;
      max-width: 100%; margin: 0 auto;
      background: rgba(255,255,255,0.025);
      border: 1px dashed rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .ad-label {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text-muted);
      pointer-events: none; user-select: none;
    }
    @media (max-width: 760px) { .ad-box { width: 100%; height: 50px; } }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1060px; margin: 0 auto;
      padding: 24px 16px 0;
    }
    .search-row {
      position: relative; margin-bottom: 16px;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 15px; pointer-events: none; opacity: 0.4;
    }
    .search-input {
      width: 100%; padding: 12px 16px 12px 40px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.16s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(201,168,76,0.5); }

    .tabs-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding-bottom: 20px;
    }
    .tab-btn {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-sub);
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); border-color: rgba(201,168,76,0.25); }
    .tab-btn.active {
      background: var(--gold-dim); color: var(--gold);
      border-color: rgba(201,168,76,0.35);
    }
    .tab-count {
      display: inline-block; font-size: 10px; font-weight: 700;
      color: var(--text-muted); margin-left: 4px;
    }
    .tab-btn.active .tab-count { color: rgba(201,168,76,0.6); }

    /* ── CARDS ── */
    .cards-wrap {
      max-width: 1060px; margin: 0 auto;
      padding: 0 16px 56px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .term-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.16s, transform 0.16s, box-shadow 0.16s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .term-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      background: rgba(201,168,76,0.04);
    }
    .term-name {
      font-size: 15px; font-weight: 800; color: var(--text);
      letter-spacing: -0.3px;
    }
    .term-en {
      font-size: 10px; font-weight: 600; color: var(--gold);
      opacity: 0.8;
    }
    .term-cat {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* 검색 결과 없음 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 64px 16px;
      color: var(--text-muted); font-size: 14px;
    }
    .empty-icon { font-size: 36px; display: block; margin-bottom: 12px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 18px;
      padding: 28px 28px 24px;
      max-width: 620px; width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      position: relative;
      animation: modalIn 0.18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--gold); background: var(--gold-dim); }
    .modal-cat {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--gold); opacity: 0.7;
      margin-bottom: 8px;
    }
    .modal-name {
      font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
      color: var(--text); margin-bottom: 4px;
    }
    .modal-en {
      font-size: 13px; color: var(--gold); margin-bottom: 18px; opacity: 0.8;
    }
    .modal-desc {
      font-size: 14px; color: var(--text-sub); line-height: 1.8;
      border-top: 1px solid var(--border); padding-top: 16px;
    }
    .modal-desc p  { margin-bottom: 12px; }
    .modal-desc h2 {
      font-size: 13px; font-weight: 800; color: var(--text);
      letter-spacing: -0.2px; margin: 18px 0 6px;
    }
    .modal-desc h2:first-child { margin-top: 0; }
    .modal-desc ul { padding-left: 0; list-style: none; }
    .modal-desc li {
      position: relative; padding-left: 14px; margin-bottom: 4px;
      color: var(--text-sub);
    }
    .modal-desc li::before {
      content: '–'; position: absolute; left: 0; color: var(--gold); font-weight: 700;
    }

    /* ── 퀄리티 아이콘 ── */
    .quality-row {
      display: flex; gap: 10px; flex-wrap: nowrap;
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }
    .quality-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .quality-item img {
      width: 80px; height: 80px; object-fit: contain;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-input);
    }
    .quality-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
      text-align: center; color: var(--text-sub);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 20px 16px;
      font-size: 11px; color: var(--text-muted);
      border-top: 1px solid var(--border); letter-spacing: 0.3px;
    }
  </style>
</head>

<script>
const TERMS = [
  { name: '페임', ko: '명성', en: 'Fame', cat: '시스템', desc: '타 게임의 경험치와 비슷한 개념으로 알비온 온라인에서는 캐릭터의 성장 지표로 사용된다.', detail: `## 킬 페임 [ 플레이어 제거 명성 ] ( Kill Fame )\n- PvP에서 유저를 처치하여 얻은 페임.\n\n## 몹 페임 [ 몹 제거 명성 ] ( Mob Fame )\n- PvE에서 몬스터를 처치하여 얻은 페임.\n\n## 총 페임 [ 전체 명성 ] ( Total Fame )\n- 모든 페임의 합산.` },
  { name: 'IP', ko: '아이템 파워', en: 'Item Power', cat: '장비', desc: '장착한 아이템의 강함을 나타내는 지표.', detail: `- 아이템의 티어, 품질, 인첸트, 숙련도에 따라 결정됨.` },
  { name: '티어', ko: 'T1 ~ T8', en: 'Tier', cat: '장비', desc: '아이템의 등급을 나타내는 값이며, 1 ~ 8까지 존재함.', detail: `- 숫자가 높을 수록 성능이 우수하다.` },
  { name: '인챈트', ko: '.0 ~ .4', en: 'Enchant', cat: '장비', desc: '아이템의 파워를 높이는 강화의 종류.', detail: `- 인챈트 1 UP은 티어 1 UP에 준하는 파워 증가 값.\n- 아티팩트 제작소에서 인챈트 가능.` },
  { name: '아이템 품질', ko: '', en: 'Item Quality', cat: '장비', desc: '아이템마다 품질이 존재하며 총 5단계로 분류됨.', detail: `- 품질이 높을 수록 아이템의 기본 능력치가 높음.\n- 각 마을, 길드 섬의 수리 센터에서 품질 업그레이드가 가능함.`, qualityItem: 'T4_MAIN_SWORD', screenshot: 'Screenshot/Item_Quality_01.png' },
  { name: '플랫', ko: 'ex) 7플', en: 'Flat', cat: '장비', desc: '티어, 인챈트를 합쳐 장비의 평균 강화 값을 나타내는 단위.', detail: `- ex) 7플랫 → 4티어 3인챈트 ( 4.3 ), 5티어 2인챈트 ( 5.2 ), 6티어 1인챈트 ( 6.1 ), 7티어 0인챈트 ( 7.0 )` },
  { name: 'PvE', ko: 'Player vs Environment', en: 'Player vs Environment', cat: '시스템', desc: '몬스터를 상대로 진행하는 전투.' },
  { name: 'PvP', ko: 'Player vs Player', en: 'Player vs Player', cat: '시스템', desc: '유저를 상대로 진행하는 전투.' },
];

const CATS = ['전체', '시스템', '장비'];

let activeCat = '전체';
let searchQ   = '';

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = CATS.map(c => {
    const count = c === '전체' ? TERMS.length : TERMS.filter(t => t.cat === c).length;
    return `<button class="tab-btn${c === activeCat ? ' active' : ''}" onclick="setTab('${c}')">${esc(c)} <span class="tab-count">${count}</span></button>`;
  }).join('');
}

function render() {
  const q = searchQ.toLowerCase();
  const filtered = TERMS.filter(t => {
    const matchCat  = activeCat === '전체' || t.cat === activeCat;
    const matchText = !q || t.name.toLowerCase().includes(q) || (t.en && t.en.toLowerCase().includes(q)) || t.desc.toLowerCase().includes(q);
    return matchCat && matchText;
  });

  const grid = document.getElementById('cardsGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span>검색 결과가 없습니다.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(t => `
    <div class="term-card" data-name="${esc(t.name)}">
      <div class="term-name">${esc(t.name)}</div>
      ${t.en ? `<div class="term-en">${esc(t.en)}</div>` : ''}
      ${activeCat === '전체' ? `<div class="term-cat">${esc(t.cat)}</div>` : ''}
    </div>
  `).join('');

  document.querySelectorAll('.term-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.name));
  });
}

function setTab(cat) {
  activeCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(cat));
  });
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${esc(line.slice(3))}</h2>`;
    } else if (line.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${esc(line.slice(2))}</li>`;
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${esc(line)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function openModal(name) {
  const t = TERMS.find(t => t.name === name);
  if (!t) return;
  document.getElementById('modalCat').textContent  = t.cat;
  document.getElementById('modalName').textContent = t.ko ? `${t.name} [ ${t.ko} ]` : t.name;
  document.getElementById('modalEn').textContent   = t.en ? `( ${t.en} )` : '';
  const descEl = document.getElementById('modalDesc');
  const content = (t.desc || '') + (t.detail ? '\n\n' + t.detail : '');
  const qualityNames = ['일반', '좋음', '뛰어남', '탁월함', '걸작'];
  const qualityHTML = t.qualityItem ? `
    <div class="quality-row">
      ${qualityNames.map((label, i) => `
        <div class="quality-item">
          <img src="https://render.albiononline.com/v1/item/${t.qualityItem}.png?quality=${i+1}" loading="lazy" alt="${label}">
          <span class="quality-label">${label}</span>
        </div>`).join('')}
    </div>` : '';
  const screenshotHTML = t.screenshot ? `
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <img src="${t.screenshot}" alt="스크린샷" style="width:100%;border-radius:10px;border:1px solid var(--border);">
    </div>` : '';
  descEl.innerHTML = renderMarkdown(content) + qualityHTML + screenshotHTML;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal({ target: document.getElementById('modalOverlay') });
});

function toggleNav() {
  document.getElementById('navBurger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}

function wip(e) {
  e.preventDefault();
  e.stopPropagation();
  alert('준비 중인 기능입니다.');
}

document.addEventListener('click', e => {
  const nav = document.querySelector('.navbar');
  if (nav && !nav.contains(e.target)) {
    document.getElementById('navBurger').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  }
});

buildTabs();
render();
</script>
</body>
</html>
